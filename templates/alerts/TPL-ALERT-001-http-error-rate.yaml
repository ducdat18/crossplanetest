# Template ID: TPL-ALERT-001
# Description: HTTP Error Rate alert - fires when 5xx error rate exceeds threshold
# Tier: real-time | Severity: critical | Interval: 1m
# Usage: Use code-generator.py generate-alert --template TPL-ALERT-001 --name <name> --interval 1m
apiVersion: alerting.grafana.crossplane.io/v1alpha1
kind: AlertruleV0Alpha1
metadata:
  name: tpl-alert-001-http-error-rate
  labels:
    template_id: TPL-ALERT-001
    tier: real-time
    severity: critical
    protocol: http
    alert-type: error-rate
  annotations:
    governance.grafana.io/template-id: "TPL-ALERT-001"
    governance.grafana.io/description: "Template for HTTP 5xx error rate alerting. Threshold: >5% over 5m window."
    governance.grafana.io/customizable: "threshold (default 0.05), job label, for duration"
spec:
  providerConfigRef:
    name: default
  deletionPolicy: Delete
  forProvider:
    name: "PLAT-SVC-CRIT-http-error-rate-high"
    folderUid: "plat-realtime"
    ruleGroup: "http-error-alerts"
    noDataState: "NoData"
    execErrState: "Error"
    for: "1m"
    isPaused: false
    annotations:
      summary: "HTTP 5xx error rate exceeds 5% on {{ $labels.job }}"
      description: |
        The HTTP 5xx error rate for service {{ $labels.job }} has exceeded 5% over the last 5 minutes.
        Current value: {{ $value | humanizePercentage }}
        This indicates significant service degradation. Check application logs, recent deployments, and upstream dependencies.
      runbook_url: "https://wiki.vpbank.com.vn/runbooks/http-error-rate"
      dashboard_url: "https://grafana.vpbank.com.vn/d/tpl-dash-001-http-svc"
    labels:
      tier: "real-time"
      severity: "critical"
      template_id: "TPL-ALERT-001"
      alert_type: "error-rate"
      protocol: "http"
    data:
      - refId: "A"
        queryType: ""
        relativeTimeRange:
          from: 600
          to: 0
        datasourceUid: "__ds_uid__"
        model:
          expr: |
            sum(rate(http_requests_total{job="__job__",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="__job__"}[5m]))
          refId: "A"
          intervalMs: 1000
          maxDataPoints: 43200
          instant: false
          hide: false
          datasource:
            type: "prometheus"
            uid: "__ds_uid__"
      - refId: "B"
        queryType: ""
        relativeTimeRange:
          from: 600
          to: 0
        datasourceUid: "__expr__"
        model:
          conditions:
            - evaluator:
                params:
                  - 0.05
                type: "gt"
              operator:
                type: "and"
              query:
                params:
                  - "A"
              reducer:
                params: []
                type: "last"
              type: "query"
          datasource:
            type: "__expr__"
            uid: "__expr__"
          expression: "A"
          hide: false
          intervalMs: 1000
          maxDataPoints: 43200
          refId: "B"
          type: "threshold"
