# Template ID: TPL-DASH-001
# Description: HTTP Service Overview - request rate, error rate, p99 latency, active connections
# Usage: Use code-generator.py generate-dashboard --template TPL-DASH-001 --name <name> --datasource-uid <uid>
apiVersion: oss.grafana.crossplane.io/v1alpha1
kind: Dashboard
metadata:
  name: tpl-dash-001-http-service-overview
  labels:
    template_id: TPL-DASH-001
    lifecycle: production
    tier: real-time
    dashboard-type: service-overview
    protocol: http
  annotations:
    governance.grafana.io/template-id: "TPL-DASH-001"
    governance.grafana.io/locked-sections: "header,datasource-variables"
    governance.grafana.io/customizable-sections: "thresholds,time-range,panel-layout"
    governance.grafana.io/description: "HTTP Service Overview template - monitors request rate, error rate, p99 latency, and active connections"
    governance.grafana.io/owner-team: "TEAM-PLAT-sre-oncall"
spec:
  providerConfigRef:
    name: default
  deletionPolicy: Delete
  forProvider:
    folder: "plat-realtime"
    overwrite: true
    message: "TPL-DASH-001 HTTP Service Overview v1.0"
    configJson: |
      {
        "title": "PLAT-http-service-overview-v1.0",
        "uid": "tpl-dash-001-http-svc",
        "description": "HTTP Service Overview - monitors request rate, error rate (5xx), p99 latency, and active connections",
        "schemaVersion": 39,
        "version": 1,
        "timezone": "browser",
        "refresh": "30s",
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "tags": ["http", "service", "overview", "TPL-DASH-001"],
        "templating": {
          "list": [
            {
              "name": "datasource",
              "type": "datasource",
              "pluginId": "prometheus",
              "label": "Prometheus Datasource",
              "hide": 0,
              "refresh": 1
            },
            {
              "name": "job",
              "type": "query",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "definition": "label_values(http_requests_total, job)",
              "label": "Service / Job",
              "hide": 0,
              "refresh": 2,
              "sort": 1
            },
            {
              "name": "namespace",
              "type": "query",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "definition": "label_values(http_requests_total{job=\"$job\"}, namespace)",
              "label": "Namespace",
              "hide": 0,
              "refresh": 2,
              "includeAll": true,
              "allValue": ".*"
            }
          ]
        },
        "panels": [
          {
            "id": 1,
            "type": "stat",
            "title": "Request Rate (RPS)",
            "description": "Total HTTP requests per second across all status codes",
            "gridPos": { "x": 0, "y": 0, "h": 4, "w": 6 },
            "fieldConfig": {
              "defaults": {
                "unit": "reqps",
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "yellow", "value": 1000 },
                    { "color": "red", "value": 5000 }
                  ]
                },
                "mappings": []
              }
            },
            "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum(rate(http_requests_total{job=\"$job\"}[5m]))",
                "refId": "A",
                "legendFormat": "RPS"
              }
            ]
          },
          {
            "id": 2,
            "type": "stat",
            "title": "Error Rate (5xx %)",
            "description": "Percentage of HTTP 5xx responses over total requests",
            "gridPos": { "x": 6, "y": 0, "h": 4, "w": 6 },
            "fieldConfig": {
              "defaults": {
                "unit": "percentunit",
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "yellow", "value": 0.01 },
                    { "color": "red", "value": 0.05 }
                  ]
                },
                "mappings": []
              }
            },
            "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum(rate(http_requests_total{job=\"$job\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=\"$job\"}[5m]))",
                "refId": "A",
                "legendFormat": "Error Rate"
              }
            ]
          },
          {
            "id": 3,
            "type": "stat",
            "title": "P99 Latency",
            "description": "99th percentile request duration",
            "gridPos": { "x": 12, "y": 0, "h": 4, "w": 6 },
            "fieldConfig": {
              "defaults": {
                "unit": "s",
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "yellow", "value": 1 },
                    { "color": "red", "value": 2 }
                  ]
                }
              }
            },
            "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"$job\"}[5m])))",
                "refId": "A",
                "legendFormat": "P99"
              }
            ]
          },
          {
            "id": 4,
            "type": "stat",
            "title": "Active Connections",
            "description": "Number of active HTTP connections",
            "gridPos": { "x": 18, "y": 0, "h": 4, "w": 6 },
            "fieldConfig": {
              "defaults": {
                "unit": "short",
                "color": { "mode": "thresholds" },
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "yellow", "value": 500 },
                    { "color": "red", "value": 1000 }
                  ]
                }
              }
            },
            "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum(http_server_active_connections{job=\"$job\"})",
                "refId": "A",
                "legendFormat": "Active Connections"
              }
            ]
          },
          {
            "id": 5,
            "type": "timeseries",
            "title": "Request Rate by Status Code",
            "description": "HTTP request rate broken down by status code family",
            "gridPos": { "x": 0, "y": 4, "h": 8, "w": 12 },
            "fieldConfig": {
              "defaults": {
                "unit": "reqps",
                "custom": { "lineWidth": 2, "fillOpacity": 10, "showPoints": "never", "spanNulls": true }
              },
              "overrides": [
                { "matcher": { "id": "byName", "options": "5xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
                { "matcher": { "id": "byName", "options": "4xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
                { "matcher": { "id": "byName", "options": "2xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] }
              ]
            },
            "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] } },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum by (status_code) (rate(http_requests_total{job=\"$job\",status=~\"2..\"}[5m]))",
                "refId": "A", "legendFormat": "2xx"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum by (status_code) (rate(http_requests_total{job=\"$job\",status=~\"4..\"}[5m]))",
                "refId": "B", "legendFormat": "4xx"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum by (status_code) (rate(http_requests_total{job=\"$job\",status=~\"5..\"}[5m]))",
                "refId": "C", "legendFormat": "5xx"
              }
            ]
          },
          {
            "id": 6,
            "type": "timeseries",
            "title": "Latency Percentiles",
            "description": "P50, P95, P99 request latency over time",
            "gridPos": { "x": 12, "y": 4, "h": 8, "w": 12 },
            "fieldConfig": {
              "defaults": {
                "unit": "s",
                "custom": { "lineWidth": 2, "fillOpacity": 5, "showPoints": "never" }
              }
            },
            "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] } },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "histogram_quantile(0.50, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"$job\"}[5m])))",
                "refId": "A", "legendFormat": "P50"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"$job\"}[5m])))",
                "refId": "B", "legendFormat": "P95"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"$job\"}[5m])))",
                "refId": "C", "legendFormat": "P99"
              }
            ]
          },
          {
            "id": 7,
            "type": "timeseries",
            "title": "Error Rate Over Time",
            "description": "5xx error rate as percentage of total requests",
            "gridPos": { "x": 0, "y": 12, "h": 8, "w": 12 },
            "fieldConfig": {
              "defaults": {
                "unit": "percentunit",
                "custom": { "lineWidth": 2, "fillOpacity": 15 },
                "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0.05 }] }
              }
            },
            "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "list", "placement": "bottom" } },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum(rate(http_requests_total{job=\"$job\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=\"$job\"}[5m]))",
                "refId": "A", "legendFormat": "5xx Error Rate"
              }
            ]
          },
          {
            "id": 8,
            "type": "timeseries",
            "title": "Active Connections Over Time",
            "description": "Number of active HTTP connections over time",
            "gridPos": { "x": 12, "y": 12, "h": 8, "w": 12 },
            "fieldConfig": {
              "defaults": {
                "unit": "short",
                "custom": { "lineWidth": 2, "fillOpacity": 10 }
              }
            },
            "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "list", "placement": "bottom" } },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum(http_server_active_connections{job=\"$job\"})",
                "refId": "A", "legendFormat": "Active Connections"
              }
            ]
          }
        ]
      }
