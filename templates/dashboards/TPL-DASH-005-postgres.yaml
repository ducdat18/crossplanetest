# Template ID: TPL-DASH-005
# Description: PostgreSQL Overview - QPS, query latency, connections, lock waits
# Usage: Use code-generator.py generate-dashboard --template TPL-DASH-005 --name <name> --datasource-uid <uid>
apiVersion: oss.grafana.crossplane.io/v1alpha1
kind: Dashboard
metadata:
  name: tpl-dash-005-postgres
  labels:
    template_id: TPL-DASH-005
    lifecycle: production
    tier: standard
    dashboard-type: database
    component: postgresql
  annotations:
    governance.grafana.io/template-id: "TPL-DASH-005"
    governance.grafana.io/locked-sections: "header,datasource-variables"
    governance.grafana.io/customizable-sections: "thresholds,time-range"
    governance.grafana.io/description: "PostgreSQL template - QPS, query latency, active connections, lock wait time"
    governance.grafana.io/owner-team: "TEAM-PLAT-sre-oncall"
spec:
  providerConfigRef:
    name: default
  deletionPolicy: Delete
  forProvider:
    folder: "plat-standard"
    overwrite: true
    message: "TPL-DASH-005 PostgreSQL v1.0"
    configJson: |
      {
        "title": "PLAT-postgres-v1.0",
        "uid": "tpl-dash-005-postgres",
        "description": "PostgreSQL Overview - QPS, query latency, active connections, and lock wait time",
        "schemaVersion": 39,
        "version": 1,
        "timezone": "browser",
        "refresh": "1m",
        "time": { "from": "now-1h", "to": "now" },
        "tags": ["postgres", "postgresql", "database", "TPL-DASH-005"],
        "templating": {
          "list": [
            {
              "name": "datasource",
              "type": "datasource",
              "pluginId": "prometheus",
              "label": "Prometheus Datasource",
              "hide": 0,
              "refresh": 1
            },
            {
              "name": "instance",
              "type": "query",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "definition": "label_values(pg_up, instance)",
              "label": "PostgreSQL Instance",
              "hide": 0,
              "refresh": 2
            },
            {
              "name": "datname",
              "type": "query",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "definition": "label_values(pg_stat_database_blks_hit{instance=\"$instance\"}, datname)",
              "label": "Database",
              "hide": 0,
              "refresh": 2,
              "includeAll": true,
              "allValue": ".*"
            }
          ]
        },
        "panels": [
          {
            "id": 1,
            "type": "stat",
            "title": "QPS (Queries/sec)",
            "description": "Total query rate per second",
            "gridPos": { "x": 0, "y": 0, "h": 4, "w": 6 },
            "fieldConfig": {
              "defaults": {
                "unit": "reqps",
                "color": { "mode": "thresholds" },
                "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1000 }, { "color": "red", "value": 5000 }] }
              }
            },
            "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum(rate(pg_stat_database_xact_commit{instance=\"$instance\",datname=~\"$datname\"}[5m])) + sum(rate(pg_stat_database_xact_rollback{instance=\"$instance\",datname=~\"$datname\"}[5m]))",
                "refId": "A", "legendFormat": "QPS"
              }
            ]
          },
          {
            "id": 2,
            "type": "stat",
            "title": "Active Connections",
            "description": "Number of active database connections",
            "gridPos": { "x": 6, "y": 0, "h": 4, "w": 6 },
            "fieldConfig": {
              "defaults": {
                "unit": "short",
                "color": { "mode": "thresholds" },
                "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 80 }, { "color": "red", "value": 100 }] }
              }
            },
            "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum(pg_stat_activity_count{instance=\"$instance\",datname=~\"$datname\",state=\"active\"})",
                "refId": "A", "legendFormat": "Active"
              }
            ]
          },
          {
            "id": 3,
            "type": "stat",
            "title": "Lock Waits",
            "description": "Transactions waiting on locks",
            "gridPos": { "x": 12, "y": 0, "h": 4, "w": 6 },
            "fieldConfig": {
              "defaults": {
                "unit": "short",
                "color": { "mode": "thresholds" },
                "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 5 }, { "color": "red", "value": 20 }] }
              }
            },
            "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum(pg_stat_activity_count{instance=\"$instance\",datname=~\"$datname\",wait_event_type=\"Lock\"})",
                "refId": "A", "legendFormat": "Lock Waits"
              }
            ]
          },
          {
            "id": 4,
            "type": "stat",
            "title": "Cache Hit Ratio",
            "description": "Buffer cache hit ratio (higher is better)",
            "gridPos": { "x": 18, "y": 0, "h": 4, "w": 6 },
            "fieldConfig": {
              "defaults": {
                "unit": "percentunit",
                "color": { "mode": "thresholds" },
                "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 0.9 }, { "color": "green", "value": 0.95 }] }
              }
            },
            "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum(rate(pg_stat_database_blks_hit{instance=\"$instance\",datname=~\"$datname\"}[5m])) / (sum(rate(pg_stat_database_blks_hit{instance=\"$instance\",datname=~\"$datname\"}[5m])) + sum(rate(pg_stat_database_blks_read{instance=\"$instance\",datname=~\"$datname\"}[5m])))",
                "refId": "A", "legendFormat": "Cache Hit Ratio"
              }
            ]
          },
          {
            "id": 5,
            "type": "timeseries",
            "title": "Query Rate Over Time",
            "description": "Committed and rolled-back transactions per second",
            "gridPos": { "x": 0, "y": 4, "h": 8, "w": 12 },
            "fieldConfig": {
              "defaults": { "unit": "reqps", "custom": { "lineWidth": 2, "fillOpacity": 10 } }
            },
            "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] } },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum by (datname) (rate(pg_stat_database_xact_commit{instance=\"$instance\",datname=~\"$datname\"}[5m]))",
                "refId": "A", "legendFormat": "commits - {{datname}}"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum by (datname) (rate(pg_stat_database_xact_rollback{instance=\"$instance\",datname=~\"$datname\"}[5m]))",
                "refId": "B", "legendFormat": "rollbacks - {{datname}}"
              }
            ]
          },
          {
            "id": 6,
            "type": "timeseries",
            "title": "Connection States",
            "description": "Database connection count by state",
            "gridPos": { "x": 12, "y": 4, "h": 8, "w": 12 },
            "fieldConfig": {
              "defaults": { "unit": "short", "custom": { "lineWidth": 2, "fillOpacity": 10 } }
            },
            "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] } },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum by (state) (pg_stat_activity_count{instance=\"$instance\",datname=~\"$datname\"})",
                "refId": "A", "legendFormat": "{{state}}"
              }
            ]
          },
          {
            "id": 7,
            "type": "timeseries",
            "title": "Lock Wait Duration",
            "description": "Time spent waiting on locks (seconds)",
            "gridPos": { "x": 0, "y": 12, "h": 8, "w": 12 },
            "fieldConfig": {
              "defaults": { "unit": "s", "custom": { "lineWidth": 2, "fillOpacity": 10 } }
            },
            "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "max(pg_locks_count{instance=\"$instance\",mode=\"ExclusiveLock\"})",
                "refId": "A", "legendFormat": "ExclusiveLock count"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "max(pg_locks_count{instance=\"$instance\",mode=\"RowShareLock\"})",
                "refId": "B", "legendFormat": "RowShareLock count"
              }
            ]
          },
          {
            "id": 8,
            "type": "timeseries",
            "title": "Temp Files & Deadlocks",
            "description": "Temp file creation rate and deadlock rate",
            "gridPos": { "x": 12, "y": 12, "h": 8, "w": 12 },
            "fieldConfig": {
              "defaults": { "unit": "short", "custom": { "lineWidth": 2, "fillOpacity": 10 } }
            },
            "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } },
            "targets": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum(rate(pg_stat_database_temp_files{instance=\"$instance\",datname=~\"$datname\"}[5m]))",
                "refId": "A", "legendFormat": "Temp Files/s"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "expr": "sum(rate(pg_stat_database_deadlocks{instance=\"$instance\",datname=~\"$datname\"}[5m]))",
                "refId": "B", "legendFormat": "Deadlocks/s"
              }
            ]
          }
        ]
      }
