# NOTE: Secret 'grafana-creds' phải được tạo thủ công trước khi apply file này.
# KHÔNG commit secret với credentials thật vào Git.
#
# Tạo secret thủ công:
#   kubectl create secret generic grafana-creds \
#     -n crossplane-system \
#     --from-literal=credentials='{"url":"http://grafana-prod.monitoring.svc.cluster.local:80","auth":"admin:<password>"}'
#
# Hoặc dùng service account token (chỉ đủ quyền cho Dashboard/Folder/Alert, không tạo được Org):
#   --from-literal=credentials='{"url":"...","auth":"glsa_xxxxx"}'
---
apiVersion: grafana.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: grafana-creds
      key: credentials
