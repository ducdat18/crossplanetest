name: Validate and Plan

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'orgs/**'
      - 'templates/**'
      - 'schemas/**'
      - 'policies/**'
      - 'config/**'
      - 'scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate Manifests
    runs-on: ubuntu-latest
    outputs:
      validation_status: ${{ steps.validate.outputs.status }}
      validation_summary: ${{ steps.validate.outputs.summary }}
      error_count: ${{ steps.validate.outputs.error_count }}
      warning_count: ${{ steps.validate.outputs.warning_count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install PyYAML jsonschema

      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            orgs/**/*.yaml
            templates/**/*.yaml
            config/**/*.yaml

      - name: Run manifest validation
        id: validate
        run: |
          # Run full validation on changed + all for cross-reference checks
          echo "=== Running manifest validation ==="

          # Validate changed files specifically
          if [ -n "${{ steps.changed-files.outputs.all_changed_files }}" ]; then
            echo "Changed files:"
            for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
              echo "  - $file"
            done
          fi

          # Run full directory validation with cross-checks
          set +e
          python scripts/validate.py --dir . --cross-check --verbose 2>&1 | tee /tmp/validation-output.txt
          VALIDATE_EXIT=$?
          set -e

          # Parse results
          ERROR_COUNT=$(grep -c "^ERROR:" /tmp/validation-output.txt 2>/dev/null || echo 0)
          WARN_COUNT=$(grep -c "^WARN:" /tmp/validation-output.txt 2>/dev/null || echo 0)

          echo "error_count=${ERROR_COUNT}" >> $GITHUB_OUTPUT
          echo "warning_count=${WARN_COUNT}" >> $GITHUB_OUTPUT

          if [ $VALIDATE_EXIT -eq 0 ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "summary=All validations passed" >> $GITHUB_OUTPUT
          elif [ $VALIDATE_EXIT -eq 2 ]; then
            echo "status=warnings" >> $GITHUB_OUTPUT
            echo "summary=Validation passed with ${WARN_COUNT} warning(s)" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "summary=Validation FAILED: ${ERROR_COUNT} error(s), ${WARN_COUNT} warning(s)" >> $GITHUB_OUTPUT
          fi

          # Save output for report
          cp /tmp/validation-output.txt /tmp/validation-result.txt

          # Don't fail this step yet - we'll report and then fail
          exit 0

      - name: Upload validation results
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: /tmp/validation-result.txt
          retention-days: 7

  opa-check:
    name: OPA Policy Check
    runs-on: ubuntu-latest
    outputs:
      opa_status: ${{ steps.opa.outputs.status }}
      opa_summary: ${{ steps.opa.outputs.summary }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Validate OPA policies syntax
        id: opa
        run: |
          echo "=== Checking OPA policy syntax ==="

          set +e
          OPA_OUTPUT=$(opa check policies/ 2>&1)
          OPA_EXIT=$?
          set -e

          echo "$OPA_OUTPUT"

          if [ $OPA_EXIT -eq 0 ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "summary=OPA policies are syntactically valid" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "summary=OPA policy check failed" >> $GITHUB_OUTPUT
          fi

          echo "$OPA_OUTPUT" > /tmp/opa-result.txt

      - name: Run OPA tests on sample resources
        run: |
          echo "=== Running OPA policy evaluation tests ==="

          # Test naming policy with a valid Dashboard
          cat > /tmp/test-dashboard.json << 'EOF'
          {
            "kind": "Dashboard",
            "apiVersion": "oss.grafana.crossplane.io/v1alpha1",
            "metadata": {
              "name": "plat-test-dashboard",
              "labels": {
                "template_id": "TPL-DASH-001",
                "lifecycle": "production"
              }
            },
            "spec": {
              "providerConfigRef": {"name": "default"},
              "forProvider": {
                "configJson": "{\"title\":\"PLAT-test-dashboard-v1.0\",\"uid\":\"plat-test-dash\",\"schemaVersion\":39,\"panels\":[]}"
              }
            }
          }
          EOF

          echo "Testing naming policy..."
          opa eval -d policies/naming.rego \
            -i /tmp/test-dashboard.json \
            "data.grafana.governance.naming.deny" || true

          echo "Testing RBAC policy..."
          cat > /tmp/test-noc.json << 'EOF'
          {
            "kind": "NOCDefaultMemberList",
            "apiVersion": "governance.grafana.io/v1",
            "metadata": {"name": "test"},
            "spec": {
              "members": [
                {"email": "noc-lead@vpbank.com.vn", "grafanaRole": "Admin"},
                {"email": "noc-eng@vpbank.com.vn", "grafanaRole": "Editor"}
              ]
            }
          }
          EOF

          opa eval -d policies/rbac.rego \
            -i /tmp/test-noc.json \
            "data.grafana.governance.rbac.deny" || true

          echo "OPA evaluation tests completed"

      - name: Upload OPA results
        uses: actions/upload-artifact@v4
        with:
          name: opa-results
          path: /tmp/opa-result.txt
          retention-days: 7

  change-report:
    name: Generate Change Report
    runs-on: ubuntu-latest
    outputs:
      change_summary: ${{ steps.report.outputs.summary }}
      resources_added: ${{ steps.report.outputs.resources_added }}
      resources_modified: ${{ steps.report.outputs.resources_modified }}
      resources_deleted: ${{ steps.report.outputs.resources_deleted }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyYAML

      - name: Generate change report
        id: report
        run: |
          echo "=== Generating Change Report ==="

          # Get diff vs base branch
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git diff --name-only $BASE_SHA $HEAD_SHA -- '*.yaml' > /tmp/changed-yaml-files.txt
          echo "Changed YAML files:"
          cat /tmp/changed-yaml-files.txt

          # Analyze changes using Python
          python3 << 'PYEOF'
          import subprocess
          import sys
          import os

          try:
              import yaml
          except ImportError:
              print("PyYAML not available")
              sys.exit(0)

          base_sha = os.environ.get("BASE_SHA", "HEAD~1")
          head_sha = os.environ.get("HEAD_SHA", "HEAD")

          added = []
          modified = []
          deleted = []

          # Read changed files list
          try:
              with open("/tmp/changed-yaml-files.txt") as f:
                  changed_files = [l.strip() for l in f if l.strip()]
          except Exception:
              changed_files = []

          for filepath in changed_files:
              # Check if file exists in HEAD (current) and BASE
              try:
                  result_head = subprocess.run(
                      ["git", "show", f"{head_sha}:{filepath}"],
                      capture_output=True, text=True
                  )
                  result_base = subprocess.run(
                      ["git", "show", f"{base_sha}:{filepath}"],
                      capture_output=True, text=True
                  )

                  if result_head.returncode != 0 and result_base.returncode == 0:
                      # Deleted
                      docs = list(yaml.safe_load_all(result_base.stdout))
                      for doc in docs:
                          if doc and doc.get("kind"):
                              deleted.append(f"{doc['kind']}/{doc.get('metadata',{}).get('name','unknown')} ({filepath})")
                  elif result_head.returncode == 0 and result_base.returncode != 0:
                      # Added
                      docs = list(yaml.safe_load_all(result_head.stdout))
                      for doc in docs:
                          if doc and doc.get("kind"):
                              added.append(f"{doc['kind']}/{doc.get('metadata',{}).get('name','unknown')} ({filepath})")
                  elif result_head.returncode == 0 and result_base.returncode == 0:
                      # Modified
                      docs = list(yaml.safe_load_all(result_head.stdout))
                      for doc in docs:
                          if doc and doc.get("kind"):
                              modified.append(f"{doc['kind']}/{doc.get('metadata',{}).get('name','unknown')} ({filepath})")
              except Exception as e:
                  print(f"Warning: Could not analyze {filepath}: {e}")

          with open("/tmp/change-report.txt", "w") as f:
              f.write("## Crossplane Resource Changes\n\n")
              if added:
                  f.write(f"### Added ({len(added)})\n")
                  for r in added:
                      f.write(f"- {r}\n")
                  f.write("\n")
              if modified:
                  f.write(f"### Modified ({len(modified)})\n")
                  for r in modified:
                      f.write(f"- {r}\n")
                  f.write("\n")
              if deleted:
                  f.write(f"### Deleted ({len(deleted)})\n")
                  for r in deleted:
                      f.write(f"- {r}\n")
                  f.write("\n")
              if not added and not modified and not deleted:
                  f.write("No resource changes detected.\n")

          print(f"Added: {len(added)}, Modified: {len(modified)}, Deleted: {len(deleted)}")

          # Write to env
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"resources_added={len(added)}\n")
              f.write(f"resources_modified={len(modified)}\n")
              f.write(f"resources_deleted={len(deleted)}\n")
              f.write(f"summary=Added:{len(added)} Modified:{len(modified)} Deleted:{len(deleted)}\n")

          PYEOF
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Upload change report
        uses: actions/upload-artifact@v4
        with:
          name: change-report
          path: /tmp/change-report.txt
          retention-days: 7

  post-pr-comment:
    name: Post PR Comment
    runs-on: ubuntu-latest
    needs: [validate, opa-check, change-report]
    if: always()

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Post comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Read artifacts
            let validationOutput = '';
            let changeReport = '';
            let opaOutput = '';

            try {
              validationOutput = fs.readFileSync('/tmp/artifacts/validation-results/validation-result.txt', 'utf8');
            } catch(e) { validationOutput = 'Validation output not available'; }

            try {
              changeReport = fs.readFileSync('/tmp/artifacts/change-report/change-report.txt', 'utf8');
            } catch(e) { changeReport = 'Change report not available'; }

            try {
              opaOutput = fs.readFileSync('/tmp/artifacts/opa-results/opa-result.txt', 'utf8');
            } catch(e) { opaOutput = 'OPA output not available'; }

            const validationStatus = '${{ needs.validate.outputs.validation_status }}';
            const opaStatus = '${{ needs.opa-check.outputs.opa_status }}';
            const errorCount = '${{ needs.validate.outputs.error_count }}';
            const warnCount = '${{ needs.validate.outputs.warning_count }}';
            const changeSummary = '${{ needs.change-report.outputs.change_summary }}';

            const validIcon = validationStatus === 'passed' ? '✅' : validationStatus === 'warnings' ? '⚠️' : '❌';
            const opaIcon = opaStatus === 'passed' ? '✅' : '❌';

            const comment = `## 🔍 Grafana Governance Platform - Validation Report

            | Check | Status | Details |
            |-------|--------|---------|
            | Manifest Validation | ${validIcon} ${validationStatus.toUpperCase()} | ${errorCount} errors, ${warnCount} warnings |
            | OPA Policy Check | ${opaIcon} ${opaStatus.toUpperCase()} | ${{ needs.opa-check.outputs.opa_summary }} |
            | Resource Changes | 📋 | ${changeSummary} |

            ${changeReport}

            <details>
            <summary>Validation Output</summary>

            \`\`\`
            ${validationOutput.slice(0, 8000)}
            \`\`\`

            </details>

            <details>
            <summary>OPA Policy Check Output</summary>

            \`\`\`
            ${opaOutput.slice(0, 2000)}
            \`\`\`

            </details>

            ---
            *Generated by Grafana Governance Platform CI/CD*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.body.includes('Grafana Governance Platform - Validation Report')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

  fail-on-errors:
    name: Enforce Validation Gate
    runs-on: ubuntu-latest
    needs: [validate, opa-check]
    if: always()

    steps:
      - name: Fail if validation errors exist
        run: |
          VALIDATE_STATUS="${{ needs.validate.outputs.validation_status }}"
          OPA_STATUS="${{ needs.opa-check.outputs.opa_status }}"
          ERROR_COUNT="${{ needs.validate.outputs.error_count }}"

          echo "Validation status: $VALIDATE_STATUS"
          echo "OPA status: $OPA_STATUS"
          echo "Error count: $ERROR_COUNT"

          if [ "$VALIDATE_STATUS" == "failed" ]; then
            echo "::error::Manifest validation failed with $ERROR_COUNT error(s). Fix errors before merging."
            exit 1
          fi

          if [ "$OPA_STATUS" == "failed" ]; then
            echo "::error::OPA policy check failed. Fix policy syntax errors before merging."
            exit 1
          fi

          echo "All validation gates passed."
