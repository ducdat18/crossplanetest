name: Drift Detection

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (report only, do not create issues)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  issues: write

concurrency:
  group: drift-detection
  cancel-in-progress: false

jobs:
  detect-drift:
    name: Detect Crossplane Resource Drift
    runs-on: ubuntu-latest
    outputs:
      drift_detected: ${{ steps.check.outputs.drift_detected }}
      drift_summary: ${{ steps.check.outputs.drift_summary }}
      drift_count: ${{ steps.check.outputs.drift_count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'
        continue-on-error: true

      - name: Configure kubectl (optional - skip if no cluster)
        id: kubectl-config
        run: |
          if [ -n "${{ secrets.KUBECONFIG_B64 }}" ]; then
            mkdir -p ~/.kube
            echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
            chmod 600 ~/.kube/config
            kubectl cluster-info 2>/dev/null && echo "kubectl_available=true" >> $GITHUB_OUTPUT || echo "kubectl_available=false" >> $GITHUB_OUTPUT
          else
            echo "kubectl_available=false" >> $GITHUB_OUTPUT
            echo "KUBECONFIG not configured - running in manifest-only mode"
          fi
        continue-on-error: true

      - name: Check Crossplane managed resources (cluster mode)
        id: cluster-check
        if: steps.kubectl-config.outputs.kubectl_available == 'true'
        run: |
          echo "=== Checking Crossplane Managed Resources ==="

          DRIFT_ITEMS=""
          DRIFT_COUNT=0

          # Check Dashboard resources
          echo "Checking Dashboard resources..."
          kubectl get dashboards.oss.grafana.crossplane.io \
            --all-namespaces \
            -o json 2>/dev/null | python3 - << 'PYEOF'
          import json, sys

          data = json.load(sys.stdin)
          items = data.get("items", [])
          drift = []

          for item in items:
            name = item.get("metadata", {}).get("name", "unknown")
            conditions = item.get("status", {}).get("conditions", [])
            ready = next((c for c in conditions if c.get("type") == "Ready"), None)
            synced = next((c for c in conditions if c.get("type") == "Synced"), None)

            if ready and ready.get("status") != "True":
              drift.append(f"Dashboard/{name}: Ready={ready.get('status')} ({ready.get('message','')})")
            if synced and synced.get("status") != "True":
              drift.append(f"Dashboard/{name}: Synced={synced.get('status')} ({synced.get('message','')})")

          for d in drift:
            print(f"DRIFT: {d}")

          sys.exit(1 if drift else 0)
          PYEOF
          DASH_EXIT=$?

          # Check AlertRule resources
          echo "Checking AlertRule resources..."
          kubectl get alertrules.oss.grafana.crossplane.io \
            --all-namespaces \
            -o json 2>/dev/null | python3 - << 'PYEOF'
          import json, sys

          data = json.load(sys.stdin)
          items = data.get("items", [])
          drift = []

          for item in items:
            name = item.get("metadata", {}).get("name", "unknown")
            conditions = item.get("status", {}).get("conditions", [])
            ready = next((c for c in conditions if c.get("type") == "Ready"), None)
            synced = next((c for c in conditions if c.get("type") == "Synced"), None)

            if ready and ready.get("status") != "True":
              drift.append(f"AlertRule/{name}: Ready={ready.get('status')} ({ready.get('message','')})")
            if synced and synced.get("status") != "True":
              drift.append(f"AlertRule/{name}: Synced={synced.get('status')} ({synced.get('message','')})")

          for d in drift:
            print(f"DRIFT: {d}")

          sys.exit(1 if drift else 0)
          PYEOF
          ALERT_EXIT=$?

          # Check Folder resources
          echo "Checking Folder resources..."
          kubectl get folders.oss.grafana.crossplane.io \
            --all-namespaces \
            -o json 2>/dev/null | python3 - << 'PYEOF'
          import json, sys

          data = json.load(sys.stdin)
          items = data.get("items", [])
          drift = []

          for item in items:
            name = item.get("metadata", {}).get("name", "unknown")
            conditions = item.get("status", {}).get("conditions", [])
            ready = next((c for c in conditions if c.get("type") == "Ready"), None)
            synced = next((c for c in conditions if c.get("type") == "Synced"), None)

            if ready and ready.get("status") != "True":
              drift.append(f"Folder/{name}: Ready={ready.get('status')} ({ready.get('message','')})")
            if synced and synced.get("status") != "True":
              drift.append(f"Folder/{name}: Synced={synced.get('status')} ({synced.get('message','')})")

          for d in drift:
            print(f"DRIFT: {d}")

          sys.exit(1 if drift else 0)
          PYEOF
          FOLDER_EXIT=$?

          # Check Organization resources
          echo "Checking Organization resources..."
          kubectl get organizations.grafana.crossplane.io \
            --all-namespaces \
            -o json 2>/dev/null | python3 - << 'PYEOF'
          import json, sys

          data = json.load(sys.stdin)
          items = data.get("items", [])
          drift = []

          for item in items:
            name = item.get("metadata", {}).get("name", "unknown")
            conditions = item.get("status", {}).get("conditions", [])
            ready = next((c for c in conditions if c.get("type") == "Ready"), None)
            synced = next((c for c in conditions if c.get("type") == "Synced"), None)

            if ready and ready.get("status") != "True":
              drift.append(f"Organization/{name}: Ready={ready.get('status')} ({ready.get('message','')})")
            if synced and synced.get("status") != "True":
              drift.append(f"Organization/{name}: Synced={synced.get('status')} ({synced.get('message','')})")

          for d in drift:
            print(f"DRIFT: {d}")

          sys.exit(1 if drift else 0)
          PYEOF
          ORG_EXIT=$?

          # Summarize
          if [ $DASH_EXIT -ne 0 ] || [ $ALERT_EXIT -ne 0 ] || [ $FOLDER_EXIT -ne 0 ] || [ $ORG_EXIT -ne 0 ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Check drift via YAML manifest analysis (fallback mode)
        id: check
        run: |
          echo "=== Drift Detection Analysis ==="

          DRIFT_DETECTED="false"
          DRIFT_COUNT=0
          DRIFT_DETAILS=""

          # In manifest-only mode, check for common issues in YAML files
          echo "Checking manifest consistency..."

          python3 << 'PYEOF'
          import os, sys, json
          from pathlib import Path

          try:
              import yaml
          except ImportError:
              print("PyYAML not available, skipping YAML analysis")
              sys.exit(0)

          repo_root = Path(".")
          drift_items = []

          # Check 1: AlertRules reference existing Folder UIDs
          folders = {}
          for f in repo_root.rglob("*.yaml"):
              if "_template" in str(f) or ".github" in str(f):
                  continue
              try:
                  with open(f) as fh:
                      for doc in yaml.safe_load_all(fh.read()):
                          if doc and doc.get("kind") == "Folder":
                              uid = doc.get("spec", {}).get("forProvider", {}).get("uid")
                              if uid:
                                  folders[uid] = str(f)
              except Exception:
                  pass

          # Check 2: Alert rules referencing missing folders
          for f in repo_root.rglob("*.yaml"):
              if "_template" in str(f) or ".github" in str(f):
                  continue
              try:
                  with open(f) as fh:
                      for doc in yaml.safe_load_all(fh.read()):
                          if doc and doc.get("kind") == "AlertRule":
                              folder_uid = doc.get("spec", {}).get("forProvider", {}).get("folderUid")
                              name = doc.get("metadata", {}).get("name", "unknown")
                              if folder_uid and folder_uid not in folders:
                                  drift_items.append({
                                      "type": "MISSING_FOLDER_REF",
                                      "resource": f"AlertRule/{name}",
                                      "detail": f"References folderUid '{folder_uid}' which does not exist",
                                      "file": str(f)
                                  })
              except Exception:
                  pass

          # Check 3: Organizations without any Admin members
          org_admins = {}
          for f in repo_root.rglob("*.yaml"):
              if "_template" in str(f) or ".github" in str(f):
                  continue
              try:
                  with open(f) as fh:
                      for doc in yaml.safe_load_all(fh.read()):
                          if doc and doc.get("kind") == "OrgMember":
                              org_ref = (doc.get("spec", {}).get("forProvider", {}).get("orgIdRef") or {}).get("name", "")
                              role = doc.get("spec", {}).get("forProvider", {}).get("role", "")
                              if org_ref:
                                  if org_ref not in org_admins:
                                      org_admins[org_ref] = []
                                  if role == "Admin":
                                      org_admins[org_ref].append(doc.get("metadata", {}).get("name"))
              except Exception:
                  pass

          # Check 4: Duplicate folder UIDs
          folder_uid_files = {}
          for uid, filepath in folders.items():
              if uid in folder_uid_files and folder_uid_files[uid] != filepath:
                  drift_items.append({
                      "type": "DUPLICATE_FOLDER_UID",
                      "resource": f"Folder/uid={uid}",
                      "detail": f"Folder UID '{uid}' defined in multiple files",
                      "file": filepath
                  })
              folder_uid_files[uid] = filepath

          # Output results
          if drift_items:
              print(f"DRIFT DETECTED: {len(drift_items)} issue(s) found")
              for item in drift_items:
                  print(f"  [{item['type']}] {item['resource']}: {item['detail']}")
                  print(f"    File: {item['file']}")
              # Write to file for GitHub Actions
              with open("/tmp/drift-details.json", "w") as f:
                  json.dump(drift_items, f, indent=2)
              sys.exit(1)
          else:
              print("No drift detected in manifest analysis")
              with open("/tmp/drift-details.json", "w") as f:
                  json.dump([], f)
              sys.exit(0)
          PYEOF
          ANALYSIS_EXIT=$?

          if [ $ANALYSIS_EXIT -ne 0 ]; then
            DRIFT_DETECTED="true"
            DRIFT_COUNT=$(cat /tmp/drift-details.json | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "1")
          fi

          # Also check if cluster check found drift
          if [ "${{ steps.cluster-check.outputs.drift_detected }}" == "true" ]; then
            DRIFT_DETECTED="true"
          fi

          echo "drift_detected=${DRIFT_DETECTED}" >> $GITHUB_OUTPUT
          echo "drift_count=${DRIFT_COUNT}" >> $GITHUB_OUTPUT

          if [ "$DRIFT_DETECTED" == "true" ]; then
            echo "drift_summary=Drift detected: ${DRIFT_COUNT} issue(s) found" >> $GITHUB_OUTPUT
          else
            echo "drift_summary=No drift detected" >> $GITHUB_OUTPUT
          fi

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: /tmp/drift-details.json
          retention-days: 30
        if: always()

  create-drift-issue:
    name: Create GitHub Issue for Drift
    runs-on: ubuntu-latest
    needs: detect-drift
    if: needs.detect-drift.outputs.drift_detected == 'true' && github.event.inputs.dry_run != 'true'

    steps:
      - name: Download drift report
        uses: actions/download-artifact@v4
        with:
          name: drift-report
          path: /tmp

      - name: Check for existing open drift issue
        id: check-issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift-detection',
            });

            const existingIssue = issues.find(i =>
              i.title.includes('[DRIFT]') && i.state === 'open'
            );

            if (existingIssue) {
              core.setOutput('issue_number', existingIssue.number);
              core.setOutput('exists', 'true');
            } else {
              core.setOutput('exists', 'false');
            }

      - name: Create or update drift issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let driftDetails = [];
            try {
              driftDetails = JSON.parse(fs.readFileSync('/tmp/drift-details.json', 'utf8'));
            } catch(e) {
              driftDetails = [];
            }

            const driftCount = '${{ needs.detect-drift.outputs.drift_count }}';
            const driftSummary = '${{ needs.detect-drift.outputs.drift_summary }}';
            const now = new Date().toISOString();

            let detailsTable = '';
            if (driftDetails.length > 0) {
              detailsTable = '\n| Type | Resource | Detail | File |\n|------|----------|--------|------|\n';
              for (const item of driftDetails) {
                detailsTable += `| ${item.type} | ${item.resource} | ${item.detail} | ${item.file} |\n`;
              }
            } else {
              detailsTable = '\nDrift detected in cluster resources. Check workflow logs for details.\n';
            }

            const issueBody = `## Grafana Platform - Drift Detected

            **Detected at:** ${now}
            **Summary:** ${driftSummary}
            **Drift items:** ${driftCount}

            ### Issues Found
            ${detailsTable}

            ### How to Resolve
            1. Review the drift items listed above
            2. Check the corresponding YAML manifests in the repository
            3. Fix any missing references or duplicate UIDs
            4. Run \`python scripts/validate.py --dir . --cross-check\` locally to verify
            5. Open a PR with the fixes
            6. The drift detection will auto-close this issue when resolved

            ### Workflow Run
            [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---
            *Auto-generated by Grafana Governance Platform drift detection. Last checked: ${now}*`;

            const issueExists = '${{ steps.check-issue.outputs.exists }}' === 'true';

            if (issueExists) {
              const issueNumber = parseInt('${{ steps.check-issue.outputs.issue_number }}');
              // Add a comment to the existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `### Drift still detected at ${now}\n\n${driftSummary}\n\n${detailsTable}`,
              });
              console.log(`Updated existing issue #${issueNumber}`);
            } else {
              // Create new issue
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[DRIFT] Crossplane resource drift detected - ${driftCount} issue(s)`,
                body: issueBody,
                labels: ['drift-detection', 'platform-ops', 'automated'],
              });
              console.log(`Created issue #${issue.number}: ${issue.html_url}`);
            }

  auto-close-drift-issue:
    name: Close Drift Issue If Resolved
    runs-on: ubuntu-latest
    needs: detect-drift
    if: needs.detect-drift.outputs.drift_detected == 'false'

    steps:
      - name: Close resolved drift issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift-detection',
            });

            const driftIssues = issues.filter(i => i.title.includes('[DRIFT]'));

            for (const issue of driftIssues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Drift resolved at ${new Date().toISOString()}. All Crossplane resources are in sync. Closing issue.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              console.log(`Closed drift issue #${issue.number}`);
            }

  notify-drift:
    name: Send Drift Notification
    runs-on: ubuntu-latest
    needs: [detect-drift, create-drift-issue]
    if: needs.detect-drift.outputs.drift_detected == 'true' && always()

    steps:
      - name: Send Slack notification (if configured)
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          DRIFT_SUMMARY="${{ needs.detect-drift.outputs.drift_summary }}"
          DRIFT_COUNT="${{ needs.detect-drift.outputs.drift_count }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{
              \"text\": \":warning: *Grafana Platform Drift Detected*\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \":warning: *Grafana Governance Platform - Drift Detected*\n${DRIFT_SUMMARY}\n<${RUN_URL}|View Details>\"
                  }
                }
              ]
            }" || echo "Slack notification failed (webhook may not be configured)"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.DRIFT_SLACK_WEBHOOK_URL }}
        continue-on-error: true
