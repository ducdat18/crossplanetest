apiVersion: alerting.grafana.crossplane.io/v1alpha1
kind: RuleGroup
metadata:
  name: vpbank-plat-http-crit-high-error-rate
  namespace: crossplane-system
  labels:
    category: availability
    managed-by: gitops-sync-plugin
    org: vpbank
    severity: warning
    tier: nrt
  annotations:
    governance.grafana.io/routing-tier: nrt
spec:
  providerConfigRef:
    name: default
  forProvider:
    name: "availability-alerts"
    folderUid: ""
    intervalSeconds: 60
    rule:
      - name: "PLAT-HTTP-CRIT-HIGH-ERROR-RATE"
        for: "3m"
        noDataState: NoData
        execErrState: Error
        condition: C
        annotations:
          description: "HTTP error rate exceeding threshold"
          summary: "High HTTP error rate on PLAT services"
        labels:
          category: availability
          managed-by: gitops-sync-plugin
          severity: warning
          tier: nrt
        data:
          - refId: A
            datasourceUid: prometheus
            queryType: range
            relativeTimeRange:
              - from: 600
                to: 0
            model: '{"expr":"sum(rate(http_requests_total{status=~\"5..\"}[5m])) > 0.05","instant":false,"intervalMs":60000,"maxDataPoints":43200,"range":true,"refId":"A","datasource":{"type":"prometheus","uid":"prometheus"}}'
          - refId: B
            datasourceUid: "__expr__"
            queryType: ""
            relativeTimeRange:
              - from: 600
                to: 0
            model: '{"type":"reduce","refId":"B","expression":"A","reducer":"last","conditions":[]}'
          - refId: C
            datasourceUid: "__expr__"
            queryType: ""
            relativeTimeRange:
              - from: 600
                to: 0
            model: '{"type":"threshold","refId":"C","expression":"B","conditions":[{"evaluator":{"type":"gt","params":[0]},"operator":{"type":"and"},"query":{"params":["B"]},"reducer":{"type":"last","params":[]},"type":"query"}]}'
