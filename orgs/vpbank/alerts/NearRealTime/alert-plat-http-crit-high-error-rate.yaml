apiVersion: oss.grafana.crossplane.io/v1alpha1
kind: AlertRule
metadata:
    name: alert-plat-http-crit-high-error-rate
    namespace: crossplane-system
    labels:
        category: availability
        managed-by: gitops-sync-plugin
        notification-policy: slack-alerts-warning
        severity: warning
        sync-date: "2026-03-30"
        tier: nrt
    annotations:
        governance.grafana.io/interval-seconds: "60"
        governance.grafana.io/routing-tier: nrt
spec:
    forProvider:
        name: PLAT-HTTP-CRIT-high-error-rate
        orgId: 0
        folderUid: ""
        ruleGroup: availability-alerts
        noDataState: NoData
        execErrState: Error
        for: 3m
        data:
            - datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                expr: sum(rate(http_requests_total{status=~"5.."}[5m])) > 0.05
                instant: false
                intervalMs: 60000
                maxDataPoints: 43200
                range: true
                refId: A
              queryType: range
              refId: A
              relativeTimeRange:
                from: 600
                to: 0
            - datasourceUid: __expr__
              model:
                conditions: []
                expression: A
                reducer: last
                refId: B
                type: reduce
              queryType: ""
              refId: B
              relativeTimeRange:
                from: 600
                to: 0
            - datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - B
                      reducer:
                        params: []
                        type: last
                      type: query
                expression: B
                refId: C
                type: threshold
              queryType: ""
              refId: C
              relativeTimeRange:
                from: 600
                to: 0
        condition: C
        labels:
            category: availability
            managed-by: gitops-sync-plugin
            notification-policy: slack-alerts-warning
            severity: warning
            sync-date: "2026-03-30"
            tier: nrt
    providerConfigRef:
        name: default
