apiVersion: alerting.grafana.crossplane.io/v1alpha1
kind: AlertruleV0Alpha1
metadata:
  name: plat-svc-crit-high-error-rate
  labels:
    tier: real-time
    severity: critical
    template_id: TPL-ALERT-001
    org: org-platform-2025
  annotations:
    governance.grafana.io/template-id: "TPL-ALERT-001"
    governance.grafana.io/routing-tier: "real-time"
spec:
  providerConfigRef:
    name: default
  forProvider:
    metadata:
      folderUid: plat-realtime
      uid: plat-svc-crit-high-error-rate
    spec:
      title: "PLAT-SVC-CRIT-high-error-rate"
      for: "1m"
      execErrState: "Error"
      noDataState: "NoData"
      annotations:
        summary: "High HTTP error rate detected on PLAT services"
        description: "Error rate exceeded 5% threshold for more than 1 minute"
        runbook_url: "https://wiki.vpbank.com.vn/runbooks/high-error-rate"
      labels:
        tier: "real-time"
        severity: "critical"
        template_id: "TPL-ALERT-001"
        org: "org-platform-2025"
      expressions:
        A: '{"refId":"A","queryType":"","relativeTimeRange":{"from":300,"to":0},"datasourceUid":"__ds_uid__","model":{"expr":"sum(rate(http_requests_total{status=~\"5..\"}[1m])) / sum(rate(http_requests_total[1m])) > 0.05","refId":"A","intervalMs":1000,"maxDataPoints":43200}}'
        B: '{"refId":"B","queryType":"","relativeTimeRange":{"from":300,"to":0},"datasourceUid":"__expr__","model":{"type":"threshold","refId":"B","expression":"A","conditions":[{"evaluator":{"type":"gt","params":[0]},"operator":{"type":"and"},"query":{"params":["A"]},"reducer":{"type":"last","params":[]},"type":"query"}],"intervalMs":1000,"maxDataPoints":43200}}'
