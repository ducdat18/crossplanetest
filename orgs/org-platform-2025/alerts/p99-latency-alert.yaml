apiVersion: alerting.grafana.crossplane.io/v1alpha1
kind: RuleGroup
metadata:
  name: plat-api-warn-p99-latency-high
  labels:
    tier: nrt
    severity: warning
    template_id: TPL-ALERT-002
    org: org-platform-2025
  annotations:
    governance.grafana.io/template-id: "TPL-ALERT-002"
    governance.grafana.io/routing-tier: "nrt"
spec:
  providerConfigRef:
    name: default
  forProvider:
    name: "plat-api-warn-p99-latency-high"
    folderUid: plat-nearrealtime
    organizationRef:
      name: org-platform-2025
    intervalSeconds: 60
    rule:
      - name: "PLAT-API-WARN-p99-latency-high"
        uid: "plat-api-warn-p99"
        for: "5m"
        execErrState: "Error"
        noDataState: "NoData"
        condition: "B"
        annotations:
          summary: "P99 latency exceeded 2s SLO on PLAT APIs"
          description: "P99 latency has been above 2 seconds for more than 5 minutes"
          runbook_url: "https://wiki.vpbank.com.vn/runbooks/p99-latency"
        labels:
          tier: "nrt"
          severity: "warning"
          template_id: "TPL-ALERT-002"
          org: "org-platform-2025"
        data:
          - refId: "A"
            datasourceUid: "prometheus"
            queryType: ""
            relativeTimeRange:
              - from: 300
                to: 0
            model: '{"expr":"histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))","refId":"A","intervalMs":1000,"maxDataPoints":43200,"instant":false}'
          - refId: "B"
            datasourceUid: "__expr__"
            queryType: ""
            relativeTimeRange:
              - from: 300
                to: 0
            model: '{"type":"threshold","refId":"B","expression":"A","conditions":[{"evaluator":{"type":"gt","params":[2]},"operator":{"type":"and"},"query":{"params":["A"]},"reducer":{"type":"last","params":[]},"type":"query"}],"intervalMs":1000,"maxDataPoints":43200}'
