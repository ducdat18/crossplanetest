# OrgMember resources for ORG-${ORG_NAME}-${YEAR}
# NOC members are auto-injected from config/noc/noc-default-members.yaml
# Add organization-specific members below
---
apiVersion: grafana.crossplane.io/v1beta1
kind: OrgMember
metadata:
  name: org-${ORG_CODE_LOWER}-${YEAR}-noc-lead
  labels:
    org: org-${ORG_CODE_LOWER}-${YEAR}
    source: noc-auto-injected
    role-group: noc
  annotations:
    governance.grafana.io/injected-from: "config/noc/noc-default-members.yaml"
spec:
  providerConfigRef:
    name: default
  forProvider:
    email: noc-lead@vpbank.com.vn
    role: Admin
    orgIdRef:
      name: org-${ORG_CODE_LOWER}-${YEAR}
