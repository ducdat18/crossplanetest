apiVersion: alerting.grafana.crossplane.io/v1alpha1
kind: RuleGroup
metadata:
    annotations:
        governance.grafana.io/interval-seconds: "60"
        governance.grafana.io/routing-tier: nrt
    labels:
        category: performance
        managed-by: gitops-sync-plugin
        notification-policy: slack-alerts-warning
        owner-team: DF
        severity: warning
        sync-date: "2026-04-01"
        template-id: TPL-ALERT-002
        tier: nrt
    name: rg-it-rtb-df-1m-group
    namespace: crossplane-system
spec:
    forProvider:
        folderUid: afhke2bqakvswa
        intervalSeconds: 60
        name: IT-RTB-DF 1m GROUP
        organizationRef:
            name: org-main-org
        rule:
            - name: DF-HTTP-HIGH-LATENCY-P95-ALERT
              for: 3m
              noDataState: NoData
              execErrState: Error
              condition: C
              data:
                - datasourceUid: mimir
                  model: '{"datasource":{"type":"prometheus","uid":"mimir"},"expr":"histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) \u003e 1","instant":false,"intervalMs":60000,"maxDataPoints":43200,"range":true,"refId":"A"}'
                  queryType: range
                  refId: A
                  relativeTimeRange:
                    - from: 600
                      to: 0
                - datasourceUid: __expr__
                  model: '{"conditions":[],"expression":"A","reducer":"last","refId":"B","type":"reduce"}'
                  queryType: ""
                  refId: B
                  relativeTimeRange:
                    - from: 600
                      to: 0
                - datasourceUid: __expr__
                  model: '{"conditions":[{"evaluator":{"params":[0],"type":"gt"},"operator":{"type":"and"},"query":{"params":["B"]},"reducer":{"params":[],"type":"last"},"type":"query"}],"expression":"B","refId":"C","type":"threshold"}'
                  queryType: ""
                  refId: C
                  relativeTimeRange:
                    - from: 600
                      to: 0
              annotations:
                description: Cảnh báo khi P95 latency vượt quá 1 giây
                summary: HTTP High Latency P95 - Main Org.
              labels:
                category: performance
                managed-by: gitops-sync-plugin
                notification-policy: slack-alerts-warning
                owner-team: DF
                severity: warning
                sync-date: "2026-04-01"
                template-id: TPL-ALERT-002
                tier: nrt
            - name: DF-AVAILABILITY-ALERT
              for: 3m
              noDataState: NoData
              execErrState: Error
              condition: C
              data:
                - datasourceUid: mimir
                  model: '{"datasource":{"type":"prometheus","uid":"mimir"},"expr":"sum(rate(http_requests_total{status=~\"5..\"}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service) \u003e 0.05","instant":false,"intervalMs":60000,"maxDataPoints":43200,"range":true,"refId":"A"}'
                  queryType: range
                  refId: A
                  relativeTimeRange:
                    - from: 600
                      to: 0
                - datasourceUid: __expr__
                  model: '{"conditions":[],"expression":"A","reducer":"last","refId":"B","type":"reduce"}'
                  queryType: ""
                  refId: B
                  relativeTimeRange:
                    - from: 600
                      to: 0
                - datasourceUid: __expr__
                  model: '{"conditions":[{"evaluator":{"params":[0],"type":"gt"},"operator":{"type":"and"},"query":{"params":["B"]},"reducer":{"params":[],"type":"last"},"type":"query"}],"expression":"B","refId":"C","type":"threshold"}'
                  queryType: ""
                  refId: C
                  relativeTimeRange:
                    - from: 600
                      to: 0
              annotations:
                description: Cảnh báo khi tỷ lệ lỗi HTTP 5xx vượt quá 5% trong 5 phút
                summary: HTTP High Error Rate - Main Org.
              labels:
                category: availability
                severity: critical
            - name: DF-KUBERNETES-ALERT
              for: 3m
              noDataState: NoData
              execErrState: Error
              condition: C
              data:
                - datasourceUid: mimir
                  model: '{"datasource":{"type":"prometheus","uid":"mimir"},"expr":"increase(kube_pod_container_status_restarts_total[15m]) \u003e 3","instant":false,"intervalMs":60000,"maxDataPoints":43200,"range":true,"refId":"A"}'
                  queryType: range
                  refId: A
                  relativeTimeRange:
                    - from: 600
                      to: 0
                - datasourceUid: __expr__
                  model: '{"conditions":[],"expression":"A","reducer":"last","refId":"B","type":"reduce"}'
                  queryType: ""
                  refId: B
                  relativeTimeRange:
                    - from: 600
                      to: 0
                - datasourceUid: __expr__
                  model: '{"conditions":[{"evaluator":{"params":[0],"type":"gt"},"operator":{"type":"and"},"query":{"params":["B"]},"reducer":{"params":[],"type":"last"},"type":"query"}],"expression":"B","refId":"C","type":"threshold"}'
                  queryType: ""
                  refId: C
                  relativeTimeRange:
                    - from: 600
                      to: 0
              annotations:
                description: Cảnh báo khi pod restart nhiều hơn 3 lần trong 15 phút
                summary: Kubernetes Pod Restart - Main Org.
              labels:
                category: kubernetes
                severity: warning
    providerConfigRef:
        name: default
